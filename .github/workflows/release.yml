name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: electronicmail.exe
            archive: electronicmail-windows-x86_64.zip
            update_asset: electronicmail-windows-x86_64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: electronicmail
            archive: electronicmail-linux-x86_64.tar.gz
            appimage: true
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: electronicmail
            archive: electronicmail-macos-aarch64.tar.gz
            update_asset: electronicmail-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            bin: electronicmail
            archive: electronicmail-macos-x86_64.tar.gz
            update_asset: electronicmail-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev pkg-config \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev imagemagick

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          mkdir dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" dist/
          cp README.md dist/
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../${{ matrix.archive }}" ./*
          else
            tar -czf "../${{ matrix.archive }}" ./*
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      # The in-app self-updater downloads a single raw binary (no archive to
      # unpack). Linux uses the AppImage below as its update asset instead.
      - name: Stage raw binary for self-update
        if: matrix.update_asset
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.update_asset }}"

      - name: Upload raw binary artifact
        if: matrix.update_asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.update_asset }}
          path: ${{ matrix.update_asset }}

      - name: Build AppImage
        if: matrix.appimage
        shell: bash
        run: |
          set -euxo pipefail
          # Assemble a minimal AppDir around the freshly built binary.
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$APPDIR/usr/bin/electronicmail"

          cat > electronicmail.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=electronicmail
          Comment=A lean, fast email client
          Exec=electronicmail
          Icon=electronicmail
          Categories=Network;Email;Office;
          Terminal=false
          EOF

          # Convert the committed Windows icon into a PNG for the AppImage
          # (the spec requires a PNG/SVG icon). ImageMagick is installed above;
          # newer versions ship `magick` instead of the legacy `convert`.
          if command -v magick >/dev/null 2>&1; then
            magick "email.ico[0]" -resize 256x256 electronicmail.png
          else
            convert "email.ico[0]" -resize 256x256 electronicmail.png
          fi

          # linuxdeploy bundles the binary's direct library dependencies; the
          # runner has no FUSE, so extract-and-run the AppImage tools instead.
          curl -L -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy \
            --appdir "$APPDIR" \
            --executable "$APPDIR/usr/bin/electronicmail" \
            --desktop-file electronicmail.desktop \
            --icon-file electronicmail.png \
            --output appimage
          mv electronicmail-*.AppImage electronicmail-linux-x86_64.AppImage

      - name: Upload AppImage artifact
        if: matrix.appimage
        uses: actions/upload-artifact@v4
        with:
          name: electronicmail-linux-x86_64.AppImage
          path: electronicmail-linux-x86_64.AppImage

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
